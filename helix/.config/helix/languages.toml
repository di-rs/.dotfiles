[[language]]
name = "typescript"
language-servers = ["vtsls"]

[[language]]
name = "tsx"
language-servers = ["vtsls"]

[[language]]
name = "javascript"
language-servers = ["vtsls"]

[[language]]
name = "jsx"
language-servers = ["vtsls"]

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

[language-server.rust-analyzer.config.check]
command = "clippy"
